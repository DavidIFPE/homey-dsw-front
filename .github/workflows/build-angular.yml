name: Build Angular

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main, develop ]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout Repo
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Install dependencies
          run: npm ci

        - name: Build Production
          run: npm run build --configuration homey-dsw-front

        - name: Upload build artifact
          uses: actions/upload-artifact@v4
          with:
            name: angular-dist
            path: dist/
            retention-days: 5